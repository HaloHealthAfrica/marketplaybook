# Fly.io config for TradeTally + Playbook
# Deploy: fly deploy
# Set secrets: fly secrets set DATABASE_URL=... REDIS_URL=... JWT_SECRET=...
# Rename app: fly apps rename <new-name>

app = "tradetally-playbook"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 80
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/api/health"
    grace_period = "30s"
